# -------------------------------
# Spring Boot Application
# -------------------------------
spring.application.name=jobhunter

# -------------------------------
# Import Environment Variables
# -------------------------------
# spring.config.import=optional:file:.env[.properties]

# -------------------------------
# Database Config
# -------------------------------
# Ép buộc phải dùng biến từ Render, nếu thiếu app sẽ báo lỗi ngay (giúp dễ debug)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate 6+ tự nhận diện Dialect, dòng này không còn cần thiết
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Driver chuẩn cho Postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# -------------------------------
# JWT Config
# -------------------------------
jobhunter.jwt.base64-secret=${JWT_SECRET}
jobhunter.jwt.access-token-validity-in-seconds=8640000
jobhunter.jwt.refresh-token-validity-in-seconds=8640000

# -------------------------------
# File Upload Config
# -------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
jobhunter.upload-file.base-uri=${UPLOAD_DIR:file:///home/hieu/jobhunter_uploads/}

# -------------------------------
# Pagination Config
# -------------------------------
spring.data.web.pageable.one-indexed-parameters=true

# -------------------------------
# Email Config (Gmail)
# -------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# -------------------------------
# OAuth2 Google Login
# -------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# -------------------------------
# Server Port
# -------------------------------
server.port=8080

# -------------------------------
# VNPAY Config
# -------------------------------
vnpay.tmnCode=${VNPAY_TMNCODE}
vnpay.hashSecret=${VNPAY_HASHSECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:5173/hr/payment/return

# -------------------------------
# Spring AI Configuration (OpenAI)
# -------------------------------
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
